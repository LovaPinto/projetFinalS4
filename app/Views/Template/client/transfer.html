<!doctype html><html lang="fr"><head><title>Faire un transfert</title><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"><link href="../assets/css/style.css" rel="stylesheet"></head><body data-role="client" data-page="transfer" data-action="TRANSFERT"><div id="sidebar"></div><div class="main"><div id="topbar"></div><main class="content"><div class="mb-4"><h1 class="title">Faire un transfert</h1><p class="subtitle">Envoyez de l'argent vers un autre client.</p></div><div class="row g-4"><div class="col-lg-7"><div class="cardx pad"><form id="moneyForm"><div class="mb-3"><label class="form-label">Numéro du destinataire</label><input class="form-control" value="0379876543" required></div><div class="mb-3"><label class="form-label">Montant</label><div class="input-group"><input id="amount" type="number" min="1" class="form-control" placeholder="Ex. 20 000" required><span class="input-group-text">Ar</span></div></div><button class="btn btn-primary w-100 py-3">Confirmer l'opération</button></form><div id="result" class="mt-3"></div></div></div><div class="col-lg-5"><div class="cardx pad"><h2 class="h5 fw-bold">Résumé</h2><div class="d-flex justify-content-between py-3 border-bottom"><span>Frais</span><b id="fee">0 Ar</b></div><div class="d-flex justify-content-between py-3"><span>Total débité</span><b id="total">0 Ar</b></div></div></div></div></main></div><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script><script src="../assets/js/app.js"></script></body></html>
